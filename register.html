<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register · Puppeter</title>
<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-body">
<div class="auth-page">

  <!-- RIGHT FORM PANEL -->
  <div class="auth-panel anim-right">
    <div class="auth-panel-inner">

      <a href="index.html" class="auth-logo">
        <img src="logo.png" alt="Logo"/>
        <span>Puppeter</span>
      </a>

      <!-- Progress Steps -->
      

      <h1 class="auth-heading">Create Account</h1>
      


      <!-- Register Form -->
      <form id="register-form" class="auth-form" novalidate>

        <!-- Name Row -->
          <div class="form-group">
            <label for="reg-fname">First Name</label>
            <input type="text" id="reg-fname" name="fname" placeholder="Marcus" required/>
          </div>
          
        </div>  
        <div class="form-group">
            <label for="reg-lname">Last Name</label>
            <input type="text" id="reg-lname" name="lname" placeholder="Vale" required/>
          </div>
        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <input type="email" id="reg-email" name="email" placeholder="you@example.com" autocomplete="email" required/>
        </div>

        <div class="form-group">
          <label for="reg-role">I am a…</label>
          <select id="reg-role" name="role" style="width:100%;padding:0.85rem 1.1rem;background:var(--card-bg);border:1px solid var(--border);color:var(--text);font-family:'Cormorant Garamond',serif;font-size:1.05rem;outline:none;transition:border-color 0.4s;">
            <option value="">Select your role…</option>
            <option>Theatre Director / Producer</option>
            <option>Film / TV Production Company</option>
            <option>Brand / Corporate Client</option>
            <option>Educator / School</option>
            <option>Private Collector</option>
            <option>Aspiring Puppeteer</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="pw">Password</label>
          <div class="auth-input-wrap">
            <input type="password" id="pw" name="password" placeholder="Create a strong password" autocomplete="new-password" required/>
            <button type="button" class="toggle-pw" aria-label="Toggle password visibility">👁️</button>
          </div>
          <div class="strength-bar">
            <div class="strength-track"><div class="strength-fill"></div></div>
            <span class="strength-label"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="pw2">Confirm Password</label>
          <div class="auth-input-wrap">
            <input type="password" id="pw2" name="password2" placeholder="Repeat password" autocomplete="new-password" required/>
            <button type="button" class="toggle-pw" aria-label="Toggle password visibility">👁️</button>
          </div>
        </div>

        <div style="margin-bottom:1.5rem">
          <label class="auth-check" style="display:flex;align-items:flex-start;gap:0.5rem;font-size:0.9rem;cursor:pointer;line-height:1.5">
            <input type="checkbox" name="terms" required style="margin-top:3px;accent-color:var(--accent);flex-shrink:0"/>
            I agree Terms of Service & Privacy Policy<a href="#" style="color:var(--accent);text-decoration:none;margin:0 0.2rem"></a><a href="#" style="color:var(--accent);text-decoration:none;margin:0 0.2rem"></a>
          </label>
        </div>

        <div style="margin-bottom:1.8rem">
          <label class="auth-check" style="display:flex;align-items:center;gap:0.5rem;font-size:0.9rem;cursor:pointer">
            <input type="checkbox" name="newsletter" style="accent-color:var(--accent)"/>
            Send me studio updates &amp; new character reveals
          </label>
        </div>

        <button type="submit" class="auth-btn">
          <span>Create Account →</span>
        </button>

      </form>

      
      <div class="auth-divider">or continue with</div>

      <!-- Social Register -->
      <div class="auth-socials" style="margin-bottom:0">
        <button class="auth-social-btn">
          <i class="fab fa-google" style="color:#EA4335"></i> Google
        </button>
        <button class="auth-social-btn">
          <i class="fab fa-facebook-f" style="color:#1877F2"></i> Facebook
        </button>
        <button class="auth-social-btn">
          <i class="fab fa-linkedin-in" style="color:#0A66C2"></i> LinkedIn
        </button>
      </div>

<p class="auth-sub">
        Already have an account?
        <a href="login.html">Sign in →</a>
      </p>
    </div>
  </div>

</div><!-- /auth-page -->

<script src="main.js"></script>
</body>
</html>
