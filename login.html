<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login · Puppeter</title>
<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="icon" type="image/png" href="logo.png"/>
</head>
<body class="auth-body">
<div class="auth-page">
  

<!-- NAVBAR -->



<!-- AUTH LAYOUT -->

  <!-- LEFT VISUAL PANEL -->
  

  <!-- RIGHT FORM PANEL -->
  <div class="auth-panel anim-right">
    <div class="auth-panel-inner">
<div class="auth-panel-controls">
    <button class="theme-toggle">☀️</button>
    <button class="rtl-toggle">
      <span class="rtl-icon">⇄</span>
      <span class="rtl-label">RTL</span>
    </button>
  </div>

  
      <a href="index.html" class="auth-logo">
        <img src="logo.png" alt="Logo"/>
        <span>Puppeter</span>
      </a>

      <h1 class="auth-heading">Sign In</h1>
      

      <!-- Social Login -->
      


      <!-- Login Form -->
      <form id="login-form" class="auth-form" novalidate>

        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input
            type="email" id="login-email" name="email"
            placeholder="marcus@puppeter.studio"
            autocomplete="email" required
          />
        </div>

        <div class="form-group">
          <label for="pw">Password</label>
          <div class="auth-input-wrap">
            <input
              type="password" id="pw" name="password"
              placeholder="••••••••"
              autocomplete="current-password" required
            />
            <button type="button" class="toggle-pw" aria-label="Toggle password visibility">👁️</button>
          </div>
        </div>

        <div class="auth-options">
          <label class="auth-check">
            <input type="checkbox" name="remember"/> Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="auth-btn">
          <span>Sign In →</span>
        </button>

      </form>
      <div class="auth-divider">or continue with email</div>

      <div class="auth-socials" style="margin-bottom:0">
        <button class="auth-social-btn">
          <i class="fab fa-google" style="color:#EA4335"></i> Google
        </button>
        <button class="auth-social-btn">
          <i class="fab fa-facebook-f" style="color:#1877F2"></i> Facebook
        </button>
        <button class="auth-social-btn">
          <i class="fab fa-linkedin-in" style="color:#0A66C2"></i> LinkedIn
        </button>
      </div>

      <!-- Back link -->
      <p class="auth-sub">
        No account yet?
        <a href="register.html">Create one free →</a>
      </p>

    </div>
  </div>

</div><!-- /auth-page -->

<script src="main.js"></script>
</body>
</html>
